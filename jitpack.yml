# Manual artifacts: committed AAR + sources (+ optional javadoc) under delivery/jitpack/.
# See delivery/jitpack/README.md for exact filenames and release checklist.
#
# JitPack treats repos with a root build.gradle as Gradle projects and discovers artifacts from
# Gradle’s publishToMavenLocal output. The standalone project jitpack-upload publishes the
# committed binaries from delivery/jitpack/ (mvn install:install-file alone is not enough).
# https://docs.jitpack.io/building/

jdk:
  - openjdk17

# Android detection can leave cwd outside repo root; script resolves ROOT via git and runs gradlew there.
install:
  - bash delivery/jitpack/jitpack-gradle-publish.sh
